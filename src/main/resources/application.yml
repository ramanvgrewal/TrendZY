server:
  port: 8080

spring:
  application:
    name: trendpulse

  datasource:
    url: jdbc:postgresql://localhost:5432/trendpulse
    username: postgres
    password: Virendra@123
    driver-class-name: org.postgresql.Driver

  ai:
    openai:
      api-key: ${GROQ_API_KEY}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: llama-3.3-70b-versatile
          temperature: 0.2
          top-p: 0.9

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  sql:
    init:
      mode: always

# ── Reddit API Configuration ──
reddit:
  user-agent: "TrendPulse/1.0 (by /u/Few_Ganache_1005)"
  subreddits: OUTFITS,femalefashionadvice,Depop,ThriftStoreHauls,streetwear,Wishlist,BuyItForLife,frugalmalefashion,deals,IndianFashion,IndiaFinance,IndianBeautyLog,bangalore,delhi,india,SkincareAddiction,MakeupAddiction,fragrance,malegrooming,AsianBeauty,GenZ,teenagers,gadgets,tech
  collect-interval-ms: 1800000  # 30 minutes
  posts-per-subreddit: 15

